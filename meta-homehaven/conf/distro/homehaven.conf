# HomeHaven Distribution Configuration
# Inherits Poky defaults and overrides what we care about.

require conf/distro/poky.conf

DISTRO = "homehaven"
DISTRO_NAME = "HomeHaven"
DISTRO_VERSION = "0.1"
DISTRO_CODENAME = "initial"

# ── Init system ────────────────────────────────────────────────────────────────
# Use the canonical Yocto include — sets systemd, usrmerge, and all required
# VIRTUAL-RUNTIME variables in one place.
require conf/distro/include/init-manager-systemd.inc
# init-manager-systemd.inc uses ??= (weak defaults) so we must force these
# explicitly to override whatever poky.conf already set.
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = ""
VIRTUAL-RUNTIME_login_manager = "shadow-base"
VIRTUAL-RUNTIME_dev_manager = "systemd"

# ── Remove features we will never need ─────────────────────────────────────────
# No display, no desktop, no graphical stack. This is a headless server.
# sysvinit is also removed — HomeHaven is pure systemd, no SysV compat.
DISTRO_FEATURES:remove = "x11 wayland vulkan sysvinit"

# ── Networking ─────────────────────────────────────────────────────────────────
# Keep ptest disabled globally — test suites have no place in a production image.
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " ptest"
